<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KryptoHlídač - Sledování kurzů kryptoměn</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="container">
    <!-- Hlavička s Dark Mode toggle -->
    <header>
        <div class="logo">
            <i class="fas fa-chart-line"></i>
            <h1>KryptoHlídač</h1>
        </div>
        <button id="darkModeToggle" class="dark-mode-btn">
            <i class="fas fa-moon"></i>
            <span>Dark mode</span>
        </button>
    </header>

    <!-- Popis aplikace -->
    <div class="hero">
        <p>Sledujte aktuální kurzy kryptoměn v reálném čase. <span class="highlight">Červená = pokles</span> za posledních 24 hodin.</p>
    </div>

    <!-- Formulář pro přidání vlastní kryptoměny -->
    <div class="card form-card">
        <h2><i class="fas fa-plus-circle"></i> Přidat kryptoměnu</h2>
        <form id="cryptoForm">
            <div class="form-group">
                <label for="cryptoInput">Název nebo symbol kryptoměny:</label>
                <div class="input-wrapper">
                    <i class="fas fa-coins"></i>
                    <input type="text" id="cryptoInput" placeholder="Např: bitcoin, ethereum, cardano, dogecoin">
                </div>
                <small class="form-hint">Zadejte název kryptoměny (např. bitcoin, solana, polkadot)</small>
                <div class="error-message" id="formError"></div>
            </div>
            <button type="submit" class="btn-primary">
                <i class="fas fa-search"></i> Přidat
            </button>
        </form>
    </div>

    <!-- Tlačítko pro obnovení všech dat -->
    <div class="refresh-bar">
        <button id="refreshAllBtn" class="btn-refresh">
            <i class="fas fa-sync-alt"></i> Obnovit všechny kurzy
        </button>
        <span id="lastUpdate" class="last-update"></span>
    </div>

    <!-- Seznam sledovaných kryptoměn -->
    <div class="crypto-grid" id="cryptoGrid">
        <!-- Karty budou dynamicky vkládány JS -->
        <div class="loading-spinner" id="loadingSpinner">
            <i class="fas fa-spinner fa-pulse"></i> Načítám data...
        </div>
    </div>

    <!-- Tlačítko pro smazání všech -->
    <div class="action-footer">
        <button id="clearAllBtn" class="btn-danger">
            <i class="fas fa-trash-alt"></i> Smazat všechny
        </button>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
